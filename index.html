<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repo of the Day</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 20px;
    }

    .container {
      max-width: 620px;
      width: 100%;
      text-align: center;
    }

    .date {
      font-size: 0.85rem;
      color: #7d8590;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 400;
      color: #7d8590;
      margin-bottom: 48px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 32px;
      text-align: left;
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: #58a6ff;
    }

    .owner {
      font-size: 0.9rem;
      color: #7d8590;
      margin-bottom: 4px;
    }

    .owner img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 6px;
    }

    .repo-name {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .repo-name a {
      color: #58a6ff;
      text-decoration: none;
    }

    .repo-name a:hover {
      text-decoration: underline;
    }

    .description {
      font-size: 1.05rem;
      color: #c9d1d9;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 0.85rem;
      color: #7d8590;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .star-icon, .fork-icon {
      width: 16px;
      height: 16px;
      fill: #7d8590;
    }

    .loading {
      color: #7d8590;
      font-size: 1rem;
    }

    .loading .dot {
      animation: blink 1.4s infinite;
    }
    .loading .dot:nth-child(2) { animation-delay: 0.2s; }
    .loading .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 20% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    .error {
      color: #f85149;
      font-size: 0.95rem;
    }

    footer {
      margin-top: 48px;
      font-size: 0.8rem;
      color: #484f58;
      text-align: center;
    }

    footer a {
      color: #58a6ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="date" id="date"></p>
    <h1>Repo of the Day</h1>
    <div id="content">
      <p class="loading">Finding today's repo<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>
    </div>
    <footer>
      Powered by <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
    </footer>
  </div>

  <script>
    const LANG_COLORS = {
      JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
      Java: '#b07219', Go: '#00ADD8', Rust: '#dea584', C: '#555555',
      'C++': '#f34b7d', 'C#': '#178600', Ruby: '#701516', PHP: '#4F5D95',
      Swift: '#F05138', Kotlin: '#A97BFF', Dart: '#00B4AB', Lua: '#000080',
      Shell: '#89e051', Vim: '#199f4b', HTML: '#e34c26', CSS: '#563d7c',
      Scala: '#c22d40', Elixir: '#6e4a7e', Haskell: '#5e5086',
      Zig: '#ec915c', Jupyter: '#DA5B0B', Vue: '#41b883', Svelte: '#ff3e00',
    };

    function formatNumber(n) {
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return n.toString();
    }

    function todayString() {
      const d = new Date();
      return d.toISOString().split('T')[0];
    }

    function displayDate() {
      const d = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('date').textContent = d.toLocaleDateString('en-US', options);
    }

    function seededIndex(dateStr, max) {
      let hash = 0;
      for (let i = 0; i < dateStr.length; i++) {
        hash = ((hash << 5) - hash) + dateStr.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash) % max;
    }

    function renderRepo(repo) {
      const langDot = repo.language
        ? `<span class="lang-dot" style="background:${LANG_COLORS[repo.language] || '#7d8590'}"></span>${repo.language}`
        : '';

      return `
        <div class="card">
          <p class="owner">
            <img src="${repo.owner.avatar_url}" alt="" loading="lazy">
            ${repo.owner.login}
          </p>
          <p class="repo-name"><a href="${repo.html_url}" target="_blank" rel="noopener">${repo.name}</a></p>
          ${repo.description ? `<p class="description">${repo.description}</p>` : ''}
          <div class="meta">
            ${langDot ? `<span class="meta-item">${langDot}</span>` : ''}
            <span class="meta-item">
              <svg class="star-icon" viewBox="0 0 16 16"><path fill="currentColor" d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25z"/></svg>
              ${formatNumber(repo.stargazers_count)}
            </span>
            <span class="meta-item">
              <svg class="fork-icon" viewBox="0 0 16 16"><path fill="currentColor" d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75v-.878a2.25 2.25 0 1 0-1.5 0v.878H6.75v-.878a2.25 2.25 0 1 0-1.5 0ZM8 14.25a.75.75 0 0 1-.75-.75v-4.5a.75.75 0 0 1 1.5 0v4.5a.75.75 0 0 1-.75.75Z"/></svg>
              ${formatNumber(repo.forks_count)}
            </span>
          </div>
        </div>
      `;
    }

    async function fetchRepoOfTheDay() {
      const content = document.getElementById('content');
      const today = todayString();

      // Search for repos created in the last 7 days, sorted by stars
      const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];
      const url = `https://api.github.com/search/repositories?q=created:>${weekAgo}&sort=stars&order=desc&per_page=30`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
        const data = await res.json();

        if (!data.items || data.items.length === 0) {
          content.innerHTML = '<p class="error">No repos found today. Check back later.</p>';
          return;
        }

        // Pick one deterministically based on today's date
        const idx = seededIndex(today, Math.min(data.items.length, 10));
        const repo = data.items[idx];

        content.innerHTML = renderRepo(repo);
      } catch (err) {
        content.innerHTML = `<p class="error">Failed to load: ${err.message}</p>`;
      }
    }

    displayDate();
    fetchRepoOfTheDay();
  </script>
</body>
</html>
